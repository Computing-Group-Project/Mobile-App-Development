name: fundflow
description: "A personal finance management app for university students with receipt scanning, group expenses, AI coaching, and analytics."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_messaging: any

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: any
  fl_chart: any
  flutter_svg: any

  # State Management
  provider: any

  # Navigation
  go_router: any

  # Receipt Scanner (ML Kit OCR)
  google_mlkit_text_recognition: any
  image_picker: any
  camera: any

  # Local Storage
  shared_preferences: any

  # Notifications
  flutter_local_notifications: any

  # Utilities
  intl: any
  uuid: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.6
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
